# -----------------------------------------------------------------------------
# WAF / reverse-proxy configuration — PRODUCTION
#
# Mirrors infra/nginx/default.dev.conf (dev) with two differences:
#   1. The frontend upstream is the static nginx server (front:80) built by
#      front/Dockerfile, not the Vite dev server — so no HMR WebSocket
#      pass-through and a smaller request burst (a prod build is a handful of
#      bundled assets, not hundreds of ESM modules).
#   2. Comments trimmed to prod-relevant notes.
# Keep the two files in sync when touching security headers, rate limits or
# the /ai auth gate.
#
# This file is mounted into /etc/nginx/templates/conf.d/default.conf.template
# of the owasp/modsecurity-crs:nginx-alpine image. The image already provides:
#     keepalive_timeout ${KEEPALIVE_TIMEOUT};       # via env var
#     http2 ${HTTP2};                                # default "on"
#     resolver <auto-detected from /etc/resolv.conf>;
#     include /etc/nginx/conf.d/modsecurity.conf;    # ModSec rules wired in
#     include /etc/nginx/conf.d/logging.conf;        # access/error logs
# -----------------------------------------------------------------------------

# Edge rate limit zones. Limits are per real client IP.
limit_req_zone $binary_remote_addr zone=general:10m rate=200r/s;
# `auth` is the credential-stuffing trap: tight.
limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

# Hide nginx version from response headers and error pages.
server_tokens off;

# ---------------------------- HTTP -> HTTPS redirect --------------------------
server {
    listen 8080 default_server;
    server_name _;

    client_header_buffer_size 1k;
    client_header_timeout     10s;

    # Healthcheck still needs to answer on HTTP for Docker
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "OK";
    }

    # Everything else: hard 301 to the HTTPS ingress.
    location / {
        return 301 https://$host:8443$request_uri;
    }
}

# ---------------------------- HTTPS application ingress -----------------------
server {
    listen 8443 ssl;
    server_name localhost;

    # Body / header / timeout caps
    # Aligned with the AI engine's HL7_MAX (64 KiB) and the image's
    # MODSEC_REQ_BODY_LIMIT (1 MiB).
    client_max_body_size      1m;
    client_body_buffer_size   16k;
    client_header_buffer_size 1k;
    client_body_timeout       10s;
    client_header_timeout     10s;
    send_timeout              30s;

    # -------- TLS --------
    ssl_certificate         /etc/nginx/certs/localhost.pem;
    ssl_certificate_key     /etc/nginx/certs/localhost-key.pem;
    ssl_protocols           TLSv1.2 TLSv1.3;
    ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache       shared:SSL:10m;
    ssl_session_timeout     1h;
    ssl_session_tickets     off;

    # -------- Security response headers --------
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "no-referrer" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), fullscreen=(self)" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Healthcheck endpoint for Docker / external probes
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "OK";
    }

    # -------- Frontend (static nginx serving the built SPA) --------
    location / {
        set $upstream_front http://front:80;
        proxy_pass $upstream_front;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        limit_req zone=general burst=100 nodelay;
    }

    # -------- Auth (tight edge rate limit) --------
    location ~ ^/api/auth/(login|signup)$ {
        set $upstream_back http://back:3001;
        proxy_pass $upstream_back;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=auth burst=5 nodelay;
    }

    # -------- Backend API --------
    location /api/ {
        set $upstream_back http://back:3001;
        proxy_pass $upstream_back;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=general burst=40 nodelay;
    }

    # -------- AI session gate --------
    # /ai/* endpoints ingest and query medical records, so they must never be
    # reachable without a session. auth_request replays the client's cookie
    # against the back's session validation; 2xx lets the request through.
    location = /auth-check {
        internal;
        set $upstream_back http://back:3001;
        proxy_pass $upstream_back/api/auth/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length    "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @ai_unauthorized {
        default_type application/json;
        return 401 '{"detail":"Not authenticated"}';
    }

    # -------- AI engine: SSE streams (must come before the generic /ai/) --------
    # Regex location matches both /ai/rag/stream and /ai/llm/stream so the
    # SSE-friendly settings (no buffering, long read timeout) apply uniformly.
    location ~ ^/ai/(rag|llm)/stream$ {
        auth_request /auth-check;
        error_page 401 = @ai_unauthorized;

        set $upstream_ai http://ai-engine:8000;
        proxy_pass $upstream_ai;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version       1.1;
        proxy_set_header         Connection '';
        proxy_buffering          off;
        proxy_cache              off;
        proxy_read_timeout       300s;
        chunked_transfer_encoding off;

        limit_req zone=general burst=10 nodelay;
    }

    # -------- AI engine (other endpoints) --------
    location /ai/ {
        auth_request /auth-check;
        error_page 401 = @ai_unauthorized;

        set $upstream_ai http://ai-engine:8000;
        proxy_pass $upstream_ai;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=general burst=20 nodelay;
    }
}
