# CRS rule customisation for ft_transcendance.
#
# This file is loaded as /etc/modsecurity.d/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf
# It runs BEFORE the OWASP CRS rule pack (REQUEST-901-* onward), so any
# `ctl:` action below applies to every subsequent rule evaluation.

# -----------------------------------------------------------------------------
# HL7 v2 payloads are pipe/caret/tilde/ampersand/backslash-delimited
# (`MSH|^~\&|...`). To the SQL-injection detector those delimiters look like SQL boolean operators,
# special-char anomalies, and quote attacks.

# This exemption is *narrow*:
#   - URI scope:   /ai/convert only (HL7 ingestion endpoint).
#   - Field scope: ARGS:json.hl7 only — the field that contains the raw HL7.
# Every other endpoint (auth, users, admin, AI chat, RAG) and every other
# JSON field on /ai/convert keep full SQLi protection.
# -----------------------------------------------------------------------------
SecRule REQUEST_URI "@beginsWith /ai/convert" \
    "id:1001,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:json.hl7"
